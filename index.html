<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voidbase // New Tab</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
                    },
                    colors: {
                        void: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                            950: '#020617',
                        }
                    },
                    boxShadow: {
                        'sharp': '0 1px 2px rgba(0,0,0,0.05), 0 4px 12px rgba(0,0,0,0.03)',
                        'sharp-dark': '0 1px 2px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.3)',
                        'focus-ring': '0 0 0 3px rgba(15, 23, 42, 0.15)',
                        'focus-ring-dark': '0 0 0 3px rgba(255, 255, 255, 0.1)',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Plus Jakarta Sans & JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Premium Minimalist Wallpapers */
        .wp-void {
            background-color: #030712;
            background-image: radial-gradient(circle at 50% 50%, #0b0f19 0%, #030712 100%);
        }

        .wp-slate {
            background-color: #0f172a;
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }

        /* Clean panel frames to avoid cheap-looking neon glows */
        .panel-border {
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.8);
        }
        .dark .panel-border {
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(15, 23, 42, 0.6);
        }

        .input-border {
            border: 1px solid rgba(0, 0, 0, 0.12);
            background: #ffffff;
        }
        .dark .input-border {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #090d16;
        }
        
        /* Blur background enhancements */
        .blur-bg {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body id="ambient-body" class="wp-void text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between font-sans transition-all duration-500 relative overflow-hidden select-none">

    <!-- Subtle grain overlay for a physical texture (removes the synthetic vector AI feeling) -->
    <div class="absolute inset-0 bg-[radial-gradient(transparent_50%,rgba(0,0,0,0.15))] pointer-events-none z-0"></div>

    <!-- Top Navigation Widgets -->
    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex items-center justify-between z-10 relative">
        <!-- Digital Clock & Minimal Greeting -->
        <div class="flex items-center gap-4">
            <div class="text-left">
                <div id="live-clock" class="text-xl font-bold tracking-tight text-slate-800 dark:text-white font-mono">00:00:00</div>
            </div>
            <span class="h-6 w-[1px] bg-slate-200 dark:bg-slate-800"></span>
            <div id="live-date" class="text-xs font-medium text-slate-500 dark:text-slate-400 font-mono">Loading...</div>
        </div>

        <!-- System Controls -->
        <div class="flex items-center gap-2">
            <button onclick="toggleSettings()" class="p-2.5 rounded-xl border border-slate-200/60 dark:border-slate-800 bg-white/40 dark:bg-slate-900/40 hover:bg-white dark:hover:bg-slate-900 text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all cursor-pointer">
                <i data-lucide="sliders" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- CENTER SEARCH AND SHORTCUTS REGION -->
    <main class="max-w-3xl w-full mx-auto px-6 py-8 flex-1 flex flex-col items-center justify-center z-10 relative">
        
        <!-- Voidbase Monomark Header -->
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="flex items-center gap-3 mb-1">
                <img
                src="https://raw.githubusercontent.com/Olibot1107/games/refs/heads/main/root/favicon.ico"
                alt="V"
                class="w-7 h-7 rounded object-cover"
                />
                <span class="text-lg font-bold tracking-[0.3em] text-slate-900 dark:text-white uppercase font-mono">Voidbase</span>
            </div>
        </div>

        <!-- SEARCH CONTAINER -->
        <form id="search-form" onsubmit="executeSearch(event)" class="w-full max-w-xl relative mb-12">
            <div class="relative flex items-center rounded-xl shadow-sharp dark:shadow-sharp-dark focus-within:ring-2 focus-within:ring-slate-900/10 dark:focus-within:ring-white/10 group transition-all duration-200">
                
                <!-- Engine Selector -->
                <button type="button" onclick="toggleEngineMenu(event)" id="engine-selector" class="absolute left-3 flex items-center gap-2 px-2.5 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800/60 rounded-lg transition-all text-slate-700 dark:text-slate-300 cursor-pointer">
                    <span id="engine-icon" class="flex items-center justify-center w-5 h-5">
                        <!-- Filled by JS dynamic configuration -->
                    </span>
                    <i data-lucide="chevron-down" class="w-3 h-3 text-slate-400"></i>
                </button>

                <!-- Search Input -->
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search Google or enter URL..." 
                    class="w-full py-4 pl-24 pr-14 rounded-xl text-sm font-medium input-border outline-none text-slate-900 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:border-slate-400 dark:focus:border-slate-500 transition-all duration-200"
                    autocomplete="off"
                    oninput="handleSearchTyping()"
                    onfocus="showSuggestions()"
                    onblur="setTimeout(hideSuggestions, 250)"
                    autofocus
                >

                <!-- Clear button / Quick submit indicator -->
                <div class="absolute right-3.5 flex items-center gap-2">
                    <button type="button" onclick="clearSearchInput()" id="clear-search" class="hidden p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 rounded-md transition-colors">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                    <span class="hidden sm:inline-flex items-center justify-center h-5.5 px-1.5 text-[9px] font-bold text-slate-400 dark:text-slate-500 font-mono bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded">
                        ENTER
                    </span>
                </div>

                <!-- DYNAMIC AUTOCOMPLETE / SUGGESTIONS DROPDOWN -->
                <div id="suggestions-box" class="absolute left-0 right-0 top-[54px] bg-white dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl z-50 overflow-hidden hidden transition-all duration-150">
                    <ul id="suggestions-list" class="py-1">
                        <!-- Populated dynamically -->
                    </ul>
                </div>

                <!-- Dropdown for engine selection -->
                <div id="engine-menu" class="absolute left-3 top-[52px] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800/80 rounded-xl shadow-lg w-44 z-50 overflow-hidden hidden">
                    <div class="p-1 flex flex-col gap-0.5">
                        <button type="button" onclick="selectEngine('google')" class="flex items-center gap-2.5 w-full text-left px-2.5 py-1.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="w-4 h-4 flex items-center justify-center">
                                <svg viewBox="0 0 24 24" class="w-3.5 h-3.5"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.62-.19-1.15-.63-1.49-1.21z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>
                            </span>
                            Google
                        </button>
                        <button type="button" onclick="selectEngine('yahoo')" class="flex items-center gap-2.5 w-full text-left px-2.5 py-1.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="w-4 h-4 flex items-center justify-center font-bold text-purple-600 text-xs">
                                Y!
                            </span>
                            Yahoo
                        </button>
                        <button type="button" onclick="selectEngine('duckduckgo')" class="flex items-center gap-2.5 w-full text-left px-2.5 py-1.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="w-4 h-4 flex items-center justify-center text-orange-500">
                                <i data-lucide="shield" class="w-3.5 h-3.5"></i>
                            </span>
                            DuckDuckGo
                        </button>
                        <button type="button" onclick="selectEngine('bing')" class="flex items-center gap-2.5 w-full text-left px-2.5 py-1.5 text-xs font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors">
                            <span class="w-4 h-4 flex items-center justify-center text-teal-500">
                                <i data-lucide="search" class="w-3.5 h-3.5"></i>
                            </span>
                            Bing
                        </button>
                    </div>
                </div>
            </div>
        </form>

        <!-- SPEED DIAL GRID (Authentic Brands) -->
        <section class="w-full">
            <div class="flex items-center justify-between mb-4 px-1">
                <span class="text-[10px] font-bold uppercase tracking-[0.15em] text-slate-400 dark:text-slate-500 font-mono">Quick Access</span>
                <button onclick="openAddShortcutModal()" class="text-xs font-medium text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white flex items-center gap-1.5 transition-colors cursor-pointer">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Node
                </button>
            </div>

            <!-- Authentic Icons Speed Dial -->
            <div id="shortcuts-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-3.5 w-full">
                <!-- Short cuts added here via JS -->
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="w-full z-10 py-6 text-center relative border-t border-slate-200/40 dark:border-slate-900/40">
        <p class="text-[10px] font-mono tracking-wider text-slate-400 dark:text-slate-500">
            SYSTEM.UPTIME: <span id="uptime-counter">0m 0s</span> // ENGINE: CHROMIUM / VOIDBASE v1.02
        </p>
    </footer>

    <!-- SETTINGS PANEL / DRAWERS -->
    <div id="settings-panel" class="fixed right-0 top-0 bottom-0 w-80 panel-border blur-bg shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-out flex flex-col justify-between p-6">
        <div>
            <!-- Settings Header -->
            <div class="flex items-center justify-between pb-4 border-b border-slate-200 dark:border-slate-800/80 mb-6">
                <div class="flex items-center gap-2">
                    <i data-lucide="sliders" class="w-4.5 h-4.5 text-slate-800 dark:text-white"></i>
                    <h3 class="text-sm font-bold font-mono uppercase tracking-wider text-slate-800 dark:text-white">Control Panel</h3>
                </div>
                <button onclick="toggleSettings()" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i data-lucide="x" class="w-4.5 h-4.5"></i>
                </button>
            </div>

            <!-- Custom Wallpapers selector -->
            <div class="space-y-6">
                <div>
                    <span class="text-[10px] font-bold font-mono uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-3">Custom Profiles</span>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="selectWallpaper('void')" class="h-12 rounded-lg border-2 border-transparent hover:border-slate-800 dark:hover:border-white wp-void relative flex items-end p-2 cursor-pointer">
                            <span class="text-[9px] font-mono font-bold text-white uppercase tracking-wider">Void Onyx</span>
                        </button>
                        <button onclick="selectWallpaper('slate')" class="h-12 rounded-lg border-2 border-transparent hover:border-slate-800 dark:hover:border-white wp-slate relative flex items-end p-2 cursor-pointer">
                            <span class="text-[9px] font-mono font-bold text-white uppercase tracking-wider">Slate Carbon</span>
                        </button>
                    </div>
                </div>

                <!-- Default Engine Preference -->
                <div>
                    <span class="text-[10px] font-bold font-mono uppercase tracking-widest text-slate-400 dark:text-slate-500 block mb-3">Fallback Engine</span>
                    <select id="default-engine-dropdown" onchange="onEngineDropdownChange(this.value)" class="w-full p-2 rounded-lg bg-white/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 text-xs font-semibold text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-slate-500">
                        <option value="google">Google</option>
                        <option value="yahoo">Yahoo</option>
                        <option value="duckduckgo">DuckDuckGo</option>
                        <option value="bing">Bing</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-200 dark:border-slate-800 text-center">
            <span class="text-[9px] font-mono text-slate-400 tracking-widest uppercase">VOIDBASE HORIZON // VER 1.02</span>
        </div>
    </div>

    <!-- ADD SHORTCUT MODAL DIALOG -->
    <div id="add-shortcut-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-200">
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 w-full max-w-sm rounded-xl p-6 shadow-2xl mx-4 transform scale-95 transition-transform duration-200">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xs font-bold font-mono uppercase tracking-wider text-slate-900 dark:text-white">Add Node</h3>
                <button onclick="closeAddShortcutModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <form onsubmit="saveShortcut(event)" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold font-mono uppercase tracking-wide text-slate-400 dark:text-slate-500 mb-1">Node Title</label>
                    <input type="text" id="shortcut-name" placeholder="E.g., Figma, GitHub" required class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 text-xs font-medium text-slate-800 dark:text-slate-200 outline-none focus:border-slate-400 dark:focus:border-slate-500">
                </div>
                <div>
                    <label class="block text-[10px] font-bold font-mono uppercase tracking-wide text-slate-400 dark:text-slate-500 mb-1">URL Endpoint</label>
                    <input type="url" id="shortcut-url" placeholder="https://..." required class="w-full p-2.5 rounded-lg bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 text-xs font-medium text-slate-800 dark:text-slate-200 outline-none focus:border-slate-400 dark:focus:border-slate-500">
                </div>
                <div class="flex items-center gap-2 pt-2 justify-end">
                    <button type="button" onclick="closeAddShortcutModal()" class="px-3.5 py-1.5 text-[10px] font-bold font-mono uppercase tracking-wide hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg text-slate-500 dark:text-slate-400 transition-colors">Cancel</button>
                    <button type="submit" class="px-3.5 py-1.5 text-[10px] font-bold font-mono uppercase tracking-wide bg-slate-900 dark:bg-white text-white dark:text-slate-950 rounded-lg transition-colors">Register</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification Popup -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 bg-slate-950 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 border border-slate-800 dark:border-slate-200/50">
        <p class="text-xs font-mono" id="toast-text"></p>
    </div>

<script>

    let shortcuts = [
        { name: "Google", url: "https://google.com", logoKey: "google" },

    // Search engine targets
    let currentEngine = 'google';
    const searchEngines = {
        google: {
            url: "https://www.google.com/search?q=",
            placeholder: "Search Google or enter URL...",

            placeholder: "Search Bing...",
            icon: "search"
        }

    // Offline Fallback Suggestions
    const predictiveSuggestions = [

    // System Startup Time
    const startTime = Date.now();

    // DOM Elements
    const ambientBody = document.getElementById('ambient-body');
    const searchInput = document.getElementById('search-input');
    const engineIcon = document.getElementById('engine-icon');
    const clearSearchBtn = document.getElementById('clear-search');
    const suggestionsBox = document.getElementById('suggestions-box');
    const suggestionsList = document.getElementById('suggestions-list');

    let suggestTimeout;

    // Init Lifecycle
    window.addEventListener('DOMContentLoaded', () => {
        // Restore dark mode
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        // Restore user configuration
        if (localStorage.getItem('preferredEngine')) {
            currentEngine = localStorage.getItem('preferredEngine');
            document.getElementById('default-engine-dropdown').value = currentEngine;
        }
        if (localStorage.getItem('preferredWallpaper')) {
            selectWallpaper(localStorage.getItem('preferredWallpaper'));
        } else {
            selectWallpaper('void');
        }

        if (localStorage.getItem('voidbaseShortcuts')) {
            shortcuts = JSON.parse(localStorage.getItem('voidbaseShortcuts'));
        }

        updateEngineUI();
        updateClock();
        renderShortcuts();
        
        // Setup inputs
        if (searchInput) {
            searchInput.addEventListener('input', handleSearchTyping);
            searchInput.addEventListener('focus', showSuggestions);
            searchInput.addEventListener('blur', hideSuggestions);
        }
        
        // Interval updates
        setInterval(updateClock, 1000);
        setInterval(updateUptime, 1000);

        lucide.createIcons();
    });

    // Search engine selection
    function toggleEngineMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('engine-menu');
        menu.classList.toggle('hidden');
    }

    window.addEventListener('click', () => {
        document.getElementById('engine-menu').classList.add('hidden');
    });

    function selectEngine(engineKey) {
        currentEngine = engineKey;
        localStorage.setItem('preferredEngine', engineKey);
        document.getElementById('default-engine-dropdown').value = engineKey;
        updateEngineUI();
    }

    function onEngineDropdownChange(val) {
        currentEngine = val;
        localStorage.setItem('preferredEngine', val);
        updateEngineUI();
    }

    function updateEngineUI() {
        const engine = searchEngines[currentEngine];
        searchInput.placeholder = engine.placeholder;
        
        if (engine.icon === 'google') {
            engineIcon.innerHTML = `
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22c-.62-.19-1.15-.63-1.49-1.21z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>

            `;
        } else if (engine.icon === 'yahoo') {
            engineIcon.innerHTML = `<span class="text-purple-600 font-extrabold font-sans text-xs tracking-tighter">Y!</span>`;
        } else {
            engineIcon.innerHTML = `<i data-lucide="${engine.icon}" class="w-4 h-4"></i>`;
        }
        lucide.createIcons();
    }

    // Input monitoring logic
    function handleSearchTyping() {
        const query = searchInput.value.trim();
        
        if (query.length > 0) {
            clearSearchBtn.classList.remove('hidden');
            
            // Debounce matching sequences to minimize DOM script insertion cycles
            clearTimeout(suggestTimeout);
            suggestTimeout = setTimeout(() => {
                fetchLiveSuggestions(query);
            }, 150);
        } else {
            clearSearchBtn.classList.add('hidden');
            suggestionsBox.classList.add('hidden');
        }
    }

    // Dynamic JSONP Injector Engine (CORS Bypass Mechanism)
    // Dynamic JSONP Injector Engine (CORS Bypass Mechanism)
function fetchLiveSuggestions(query) {
    // 1. Clean any existing dynamic script elements first
    const oldScript = document.getElementById('jsonp-suggest-script');
    if (oldScript) oldScript.remove();

    // 2. CRITICAL FIX: Define the global callback BEFORE creating the script tag
    window.suggestCallback = function(data) {
        if (data && Array.isArray(data[1])) {
            renderSuggestions(data[1]);
        } else {
            renderSuggestions([]);
        }
        // Self-clean global variable after evaluation completes
        delete window.suggestCallback;
    };

    // 3. Now it is completely safe to construct and append the script tag
    const script = document.createElement('script');
    script.id = 'jsonp-suggest-script';
    script.src = `https://suggestqueries.google.com/complete/search?client=youtube&q=${encodeURIComponent(query)}&callback=suggestCallback`;
    
    script.onerror = function() {
        console.warn("JSONP Script load blocked or failed. Switching to structural local predictive logic arrays.");
        const localMatches = predictiveSuggestions.filter(item => 
            item.toLowerCase().includes(query.toLowerCase())
        );
        renderSuggestions(localMatches);
    };

    document.body.appendChild(script);
}

    function clearSearchInput() {
        searchInput.value = '';
        clearSearchBtn.classList.add('hidden');
        suggestionsBox.classList.add('hidden');
        searchInput.focus();
    }

    function showSuggestions() {
        const query = searchInput.value.trim();
        if (query.length > 0) {
            fetchLiveSuggestions(query);
        } else {
            renderSuggestions([]);
        }
    }

    function hideSuggestions() {
        // Micro-timeout delays to ensure selection inputs hook correctly before closing container
        setTimeout(() => {
            suggestionsBox.classList.add('hidden');
        }, 180);
    }

    // Render suggestions interface (Safely unwraps nested JSONP result structures)
    function renderSuggestions(rawMatches) {
        suggestionsList.innerHTML = '';
        const query = searchInput.value.trim().toLowerCase();
        
        let matches = [];

        if (rawMatches && rawMatches.length > 0) {
            // Unpack strings from nested structures securely if needed
            matches = rawMatches.map(item => Array.isArray(item) ? item[0] : item);
        } else {
            if (query) {
                matches = predictiveSuggestions.filter(item => item.includes(query)).slice(0, 5);
            } else {
                matches = []
            }
        }

        if (query.includes('.') && !query.includes(' ')) {
            const domain = query.startsWith('http') ? query : `https://${query}`;
            matches.unshift(`go to ${domain}`);
        }

        if (matches.length === 0) {
            suggestionsBox.classList.add('hidden');
            return;
        }

        matches.slice(0, 6).forEach(matchStr => {
            // Edge safety layer if empty nodes leak in
            if (typeof matchStr !== 'string') return;

            const isDirectLink = matchStr.startsWith("go to ");
            const li = document.createElement('li');
            li.innerHTML = `
                <button type="button" onmousedown="applySuggestion('${matchStr.replace(/'/g, "\\'")}')" class="w-full text-left px-4 py-2.5 text-xs font-mono font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-900 flex items-center justify-between transition-colors">
                    <div class="flex items-center gap-2.5">
                        <i data-lucide="${isDirectLink ? 'external-link' : 'search'}" class="w-3.5 h-3.5 text-slate-400"></i>
                        <span>${matchStr}</span>
                    </div>
                    <span class="text-[9px] text-slate-400 uppercase tracking-widest">Select</span>
                </button>
            `;
            suggestionsList.appendChild(li);
        });

        suggestionsBox.classList.remove('hidden');
        lucide.createIcons();
    }

    function applySuggestion(val) {
        if (val.startsWith("go to ")) {
            window.location.href = val.replace("go to ", "");
        } else {
            searchInput.value = val;
            executeSearch();
        }
    }

    function executeSearch(event) {
        if (event) event.preventDefault();
        const val = searchInput.value.trim();
        if (!val) return;

        const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
        if (urlPattern.test(val)) {
            let targetUrl = val;
            if (!/^https?:\/\//i.test(val)) {
                targetUrl = 'https://' + val;
            }
            window.location.href = targetUrl;
        } else {
            window.location.href = searchEngines[currentEngine].url + encodeURIComponent(val);
        }
    }

    // Live Clock Logic
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();

        document.getElementById('live-clock').innerText = `${hours}:${minutes}:${seconds}`;
        const options = { weekday: 'short', month: 'short', day: 'numeric' };
        document.getElementById('live-date').innerText = now.toLocaleDateString(undefined, options);
    }

    // System Uptime Tracker
    function updateUptime() {
        const diffMs = Date.now() - startTime;
        const diffMins = Math.floor(diffMs / 60000);
        const diffSecs = Math.floor((diffMs % 60000) / 1000);
        document.getElementById('uptime-counter').innerText = `${diffMins}m ${diffSecs}s`;
    }

    // Aesthetics Configuration Settings
    if (typeof selectWallpaper !== 'function') {
        window.selectWallpaper = function(themeName) {
            ambientBody.className = "text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between font-sans transition-all duration-500 relative overflow-hidden select-none";
            
            if (themeName === 'void') {
                ambientBody.classList.add('wp-void');
            } else if (themeName === 'slate') {
                ambientBody.classList.add('wp-slate');
            }
            localStorage.setItem('preferredWallpaper', themeName);
        }
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.classList.toggle('translate-x-full');
    }

    // Speed Dial rendering
    function renderShortcuts() {
        const grid = document.getElementById('shortcuts-grid');
        grid.innerHTML = '';

        shortcuts.forEach((sc, index) => {
            const tile = document.createElement('div');
            tile.className = "group relative flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200/40 dark:border-slate-800/40 bg-white/50 dark:bg-slate-900/40 hover:bg-white dark:hover:bg-slate-900/80 shadow-sharp hover:shadow-lg transition-all duration-200 text-center";
            
            const backupLetter = sc.name.charAt(0).toUpperCase();
            const officialLogo = brandLogos[sc.logoKey] || `
                <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-mono font-bold text-xs text-slate-700 dark:text-slate-300">
                    ${backupLetter}
                </div>
            `;

            tile.innerHTML = `
                <button onclick="removeShortcut(${index}, event)" class="absolute top-2.5 right-2.5 p-1 text-slate-400 hover:text-rose-500 rounded opacity-0 group-hover:opacity-100 transition-opacity z-10 cursor-pointer" title="Remove Site">
                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                </button>
                <a href="${sc.url}" class="flex flex-col items-center w-full h-full justify-center">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center mb-2 transition-transform duration-200 group-hover:scale-105">
                        ${officialLogo}

                    <span class="text-xs font-bold text-slate-800 dark:text-slate-200 tracking-tight truncate max-w-full">${sc.name}</span>

            grid.appendChild(tile);

        lucide.createIcons();

    // Shortcut actions
    function openAddShortcutModal() {
        const modal = document.getElementById('add-shortcut-modal');
        modal.classList.remove('opacity-0', 'pointer-events-none');
        modal.querySelector('div').classList.remove('scale-95');
    }

    // Modal helpers
    if (typeof closeAddShortcutModal !== 'function') {
        window.closeAddShortcutModal = function() {
            const modal = document.getElementById('add-shortcut-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
            document.getElementById('shortcut-name').value = '';
            document.getElementById('shortcut-url').value = '';
        }
    }

    function saveShortcut(e) {
        e.preventDefault();
        const name = document.getElementById('shortcut-name').value.trim();
        let url = document.getElementById('shortcut-url').value.trim();

        if (name && url) {
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            const matchedKey = Object.keys(brandLogos).find(key => name.toLowerCase().includes(key));

            shortcuts.push({
                name: name,
                url: url,
                logoKey: matchedKey || null
            });

            localStorage.setItem('voidbaseShortcuts', JSON.stringify(shortcuts));
            renderShortcuts();
            closeAddShortcutModal();
            showToast(`Node "${name}" successfully registered.`);
        }
    }

    function removeShortcut(index, event) {
        event.preventDefault();
        event.stopPropagation();
        
        const name = shortcuts[index].name;
        shortcuts.splice(index, 1);
        localStorage.setItem('voidbaseShortcuts', JSON.stringify(shortcuts));
        renderShortcuts();
        showToast(`Node "${name}" unregistered.`);
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-text').innerText = message;
        toast.className = "fixed bottom-6 right-6 z-50 transform translate-y-0 opacity-100 bg-slate-950 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 border border-slate-800 dark:border-slate-200/50 transition-all duration-300";
        
        setTimeout(() => {
            toast.className = "fixed bottom-6 right-6 z-50 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 bg-slate-950 dark:bg-white text-white dark:text-slate-900 px-4 py-3 rounded-lg shadow-xl flex items-center gap-3 border border-slate-800 dark:border-slate-200/50";
        }, 2500);
    }
